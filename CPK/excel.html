<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CPK 数据生成器 · 重复条码版</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  * { box-sizing: border-box; }
  body { font-family: 'Segoe UI', Roboto, system-ui, sans-serif; padding: 24px; background: #f0f2f5; margin: 0; }
  .container { max-width: 1440px; margin: 0 auto; background: white; padding: 20px 28px 32px; border-radius: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
  h2 { margin: 0 0 6px 0; font-weight: 500; color: #0b1a33; display: flex; align-items: center; gap: 14px; flex-wrap: wrap; }
  h2 small { font-size: 15px; font-weight: 400; color: #475569; margin-left: 6px; }
  .subhead { color: #475569; font-size: 14px; margin-bottom: 18px; border-left: 3px solid #3b82f6; padding-left: 16px; background: #f8fafc; border-radius: 0 12px 12px 0; line-height: 1.5; }

  .toolbar { display: flex; flex-wrap: wrap; align-items: center; gap: 12px 18px; background: #f8fafc; padding: 14px 20px; border-radius: 18px; border: 1px solid #e2e8f0; margin: 10px 0 18px; }
  .toolbar label { display: flex; align-items: center; gap: 5px; font-size: 14px; color: #1e293b; }
  .toolbar input[type="number"] { width: 72px; padding: 6px 8px; border: 1px solid #cbd5e1; border-radius: 8px; background: white; font-size: 14px; }
  .toolbar input[type="number"]:focus { outline: 2px solid #3b82f6; border-color: transparent; }
  .toolbar input[type="range"] { width: 100px; accent-color: #2563eb; }
  .prob-indicator { background: #1e293b; color: white; padding: 2px 14px; border-radius: 40px; font-size: 13px; font-weight: 500; letter-spacing: 0.3px; }
  .btn-group { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; }
  .btn { background: white; border: 1px solid #d1d5db; padding: 6px 16px; border-radius: 30px; font-size: 13px; font-weight: 500; color: #1e293b; cursor: pointer; transition: 0.15s; box-shadow: 0 1px 2px rgba(0,0,0,0.02); }
  .btn:hover { background: #f1f5f9; border-color: #94a3b8; }
  .btn-primary { background: #2563eb; border-color: #2563eb; color: white; }
  .btn-primary:hover { background: #1d4ed8; }
  .btn-success { background: #16a34a; border-color: #16a34a; color: white; }
  .btn-success:hover { background: #15803d; }
  .btn-danger { background: #dc2626; border-color: #dc2626; color: white; }
  .btn-danger:hover { background: #b91c1c; }
  .btn-warning { background: #f59e0b; border-color: #f59e0b; color: white; }
  .btn-warning:hover { background: #d97706; border-color: #d97706; }
  .btn-outline { background: transparent; border-color: #cbd5e1; }

  .table-wrap { overflow-x: auto; margin-top: 12px; border-radius: 16px; border: 1px solid #e9edf2; }
  table { border-collapse: collapse; width: 100%; font-size: 14px; min-width: 700px; }
  th { background: #f1f4f9; color: #0b1a33; font-weight: 600; padding: 12px 8px; border-bottom: 2px solid #d1d9e6; white-space: nowrap; }
  td { padding: 8px 10px; border-bottom: 1px solid #e9edf2; text-align: center; transition: 0.06s; }
  tr:hover td { background: #fafcff; }
  .high { background-color: #dcfce7; }
  .low { background-color: #fee2e2; }
  .invalid { background-color: #f1f5f9; color: #94a3b8; }
  .outlier { background-color: #fef9c3; color: #854d0e; font-weight: 500; }
  .duplicate-sn { background-color: #e0e7ff; color: #1e40af; font-weight: 600; border: 1px dashed #6366f1; }
  .time-node { font-family: 'JetBrains Mono', 'Fira Code', monospace; font-size: 13px; color: #0f172a; background: #eef2f6; padding: 2px 10px; border-radius: 40px; display: inline-block; letter-spacing: 0.2px; }
  .sn-cell { font-family: 'JetBrains Mono', monospace; font-size: 13px; font-weight: 500; color: #0b1a33; letter-spacing: 0.5px; background: #f8fafc; padding: 2px 6px; border-radius: 6px; }
  .slot-cell { font-weight: 500; color: #475569; }
  .footer-hint { margin-top: 16px; font-size: 13px; color: #475569; display: flex; gap: 24px; flex-wrap: wrap; background: #fafcfd; padding: 8px 16px; border-radius: 40px; }
  .badge { background: #e9edf2; padding: 2px 14px; border-radius: 40px; font-size: 12px; }
  .legend-dot { display: inline-block; width: 14px; height: 14px; border-radius: 4px; margin-right: 4px; vertical-align: middle; }
  .col-fixed { min-width: 120px; }
  .duplicate-badge { background: #6366f1; color: white; padding: 0 10px; border-radius: 30px; font-size: 11px; font-weight: 600; margin-left: 4px; }
</style>
</head>
<body>
<div class="container">
  <h2>
    🔁 CPK 数据生成器 · 重复条码版
    <small>A列=时间 · B列=SN(可重复)</small>
  </h2>
  <div class="subhead">🔹 超标数值 = 超出基准±20 · 点击单元格切换有效/无效 · SN可生成重复条码</div>

  <div class="toolbar">
    <label>行数 <input type="number" id="rowCount" value="30"></label>
    <label>列数 <input type="number" id="colCount" value="10"></label>

    <div style="display:flex; align-items:center; gap:6px; background:#eef2f6; padding:2px 14px 2px 10px; border-radius:40px;">
      <span style="font-size:13px; font-weight:500;">超标概率</span>
      <input type="range" id="outlierProbRange" min="0" max="40" value="12" style="width:110px;">
      <span class="prob-indicator" id="probDisplay">12%</span>
    </div>

    <div class="btn-group">
      <button class="btn btn-primary" onclick="generateHeaderAndData()">🔄 随机生成</button>
      <button class="btn btn-success" onclick="generateTargetCPK()">🎯 目标CPK</button>
      <button class="btn btn-danger" onclick="addOutlierRows()">⚠️ 超标行</button>
      <button class="btn btn-warning" onclick="generateDuplicateSN()">🔁 重复条码</button>
      <button class="btn btn-outline" onclick="exportExcel()">📥 导出Excel</button>
    </div>

    <div style="display:flex; align-items:center; gap:6px; background:#f1f5f9; padding:2px 14px; border-radius:40px;">
      <span style="font-size:13px; font-weight:500;">重复条码数</span>
      <input type="number" id="duplicateCount" value="5" min="1" max="50" style="width:60px;">
      <span style="font-size:13px; font-weight:500;">重复次数</span>
      <input type="number" id="duplicateTimes" value="3" min="2" max="10" style="width:60px;">
    </div>

    <label style="margin-left:auto;"><span class="badge">点击单元格切换</span></label>
  </div>

  <div class="table-wrap">
    <table id="dataTable">
      <thead></thead>
      <tbody></tbody>
    </table>
  </div>
  <div class="footer-hint">
    <span><span class="legend-dot" style="background:#dcfce7;"></span> 正常(高CPK)</span>
    <span><span class="legend-dot" style="background:#fee2e2;"></span> 低CPK</span>
    <span><span class="legend-dot" style="background:#fef9c3;border:1px solid #ca8a04;"></span> 超标 ⚡</span>
    <span><span class="legend-dot" style="background:#f1f5f9;"></span> 无效</span>
    <span><span class="legend-dot" style="background:#e0e7ff;border:1px solid #6366f1;"></span> 重复SN</span>
    <span>⏱️ A列=时间 · B列=15位SN</span>
  </div>
</div>

<script>
  // ---------- 全局参数 ----------
  let outlierProbability = 12;
  let snList = []; // 存储所有已生成的SN，用于检测重复

  const rangeInput = document.getElementById('outlierProbRange');
  const probDisplay = document.getElementById('probDisplay');
  rangeInput.addEventListener('input', function() {
    outlierProbability = parseInt(this.value, 10);
    probDisplay.textContent = outlierProbability + '%';
  });

  // ---------- 工具函数 ----------
  function randomTime() {
    const h = String(Math.floor(Math.random() * 24)).padStart(2, '0');
    const m = String(Math.floor(Math.random() * 60)).padStart(2, '0');
    const s = String(Math.floor(Math.random() * 60)).padStart(2, '0');
    return `${h}:${m}:${s}`;
  }

  // 生成15位SN
  function generateSN15() {
    let sn = '';
    sn += String(Math.floor(Math.random() * 9) + 1);
    for (let i = 1; i < 15; i++) {
      sn += String(Math.floor(Math.random() * 10));
    }
    return sn;
  }

  // 生成指定数量的不重复SN
  function generateUniqueSNs(count) {
    const snSet = new Set();
    const result = [];
    let attempts = 0;
    while (result.length < count && attempts < 10000) {
      const sn = generateSN15();
      if (!snSet.has(sn)) {
        snSet.add(sn);
        result.push(sn);
      }
      attempts++;
    }
    return result;
  }

  // 生成数值
  function randomValueWithOutlier(base, tolerance = 20, highCPK = true) {
    const isOutlier = (Math.random() * 100) < outlierProbability;
    if (isOutlier) {
      const multiplier = 2 + Math.random() * 3;
      const sign = Math.random() > 0.5 ? 1 : -1;
      const offset = tolerance * multiplier * (0.6 + Math.random() * 0.6);
      let val = base + sign * offset;
      if (Math.abs(val - base) <= tolerance) {
        val = base + (Math.random() > 0.5 ? 1 : -1) * (tolerance + 5 + Math.random() * 20);
      }
      return Math.round(val);
    } else {
      const sigma = highCPK ? tolerance / 3 : tolerance * 1.5;
      return Math.round(base + (Math.random() * 2 - 1) * sigma);
    }
  }

  function isOutlierValue(val, base, tolerance = 20) {
    return Math.abs(val - base) > tolerance;
  }

  function getBaseByColIndex(colIdx) {
    const bases = [100, 200, 300, -100, -200];
    return bases[colIdx % bases.length];
  }

  // ---------- 生成表头 ----------
  function generateHeader(colCount) {
    const thead = document.querySelector("#dataTable thead");
    const tr = document.createElement("tr");
    tr.innerHTML = `<th style="min-width:140px;">⏱️ 时间 (A)</th><th style="min-width:160px;">🔢 SN (B) 15位</th>`;
    for (let i = 0; i < colCount; i++) {
      const base = getBaseByColIndex(i);
      tr.innerHTML += `<th>C${i+1}(${base}±20)</th>`;
    }
    thead.innerHTML = "";
    thead.appendChild(tr);
    // 重置SN列表
    snList = [];
  }

  // ---------- 核心生成 ----------
  function generateHeaderAndData() {
    const rowCount = parseInt(document.getElementById("rowCount").value) || 30;
    const colCount = parseInt(document.getElementById("colCount").value) || 10;
    generateHeader(colCount);

    const tbody = document.querySelector("#dataTable tbody");
    tbody.innerHTML = "";

    // 预生成所有SN，避免重复
    const sns = generateUniqueSNs(rowCount);
    snList = sns.slice();

    for (let i = 0; i < rowCount; i++) {
      const tr = document.createElement("tr");
      const timeStr = randomTime();
      const sn = sns[i] || generateSN15();

      let tds = `<td class="slot-cell"><span class="time-node">${timeStr}</span></td>`;
      tds += `<td class="sn-cell">${sn}</td>`;

      for (let j = 0; j < colCount; j++) {
        const base = getBaseByColIndex(j);
        const val = randomValueWithOutlier(base, 20, true);
        const isOut = isOutlierValue(val, base, 20);
        let cls = isOut ? 'outlier' : 'high';
        tds += `<td class="${cls}">${val}</td>`;
      }
      tr.innerHTML = tds;
      tbody.appendChild(tr);
    }
  }

  // ---------- 生成重复条码 ----------
  function generateDuplicateSN() {
    const tbody = document.querySelector("#dataTable tbody");
    if (!tbody.rows.length) {
      alert("请先生成数据！");
      return;
    }

    const dupCount = parseInt(document.getElementById("duplicateCount").value) || 5;
    const dupTimes = parseInt(document.getElementById("duplicateTimes").value) || 3;

    if (dupCount < 1 || dupTimes < 2) {
      alert("重复条码数至少为1，重复次数至少为2");
      return;
    }

    // 获取当前所有行的SN
    const rows = tbody.rows;
    const currentSNs = [];
    for (let i = 0; i < rows.length; i++) {
      const snCell = rows[i].cells[1];
      if (snCell && !snCell.classList.contains('invalid')) {
        currentSNs.push(snCell.textContent.trim());
      }
    }

    if (currentSNs.length < dupCount * dupTimes) {
      alert(`当前有效SN数量不足，需要至少 ${dupCount * dupTimes} 个不同的SN才能生成 ${dupCount} 组重复（每组重复 ${dupTimes} 次）`);
      return;
    }

    // 随机选择 dupCount 个不同的SN作为重复对象
    const shuffled = currentSNs.slice().sort(() => Math.random() - 0.5);
    const selectedSNs = shuffled.slice(0, dupCount);

    // 为每个选中的SN生成重复
    const duplicateMap = new Map();
    selectedSNs.forEach(sn => {
      // 找到该SN所在的行索引
      const indices = [];
      for (let i = 0; i < rows.length; i++) {
        const snCell = rows[i].cells[1];
        if (snCell && snCell.textContent.trim() === sn && !snCell.classList.contains('invalid')) {
          indices.push(i);
        }
      }
      if (indices.length > 0) {
        // 随机选择一个作为"母本"，复制其数据列
        const sourceIdx = indices[Math.floor(Math.random() * indices.length)];
        duplicateMap.set(sn, sourceIdx);
      }
    });

    // 对每个选中的SN，生成 dupTimes-1 个重复行（因为原始行已存在）
    let newRows = [];
    for (const [sn, sourceIdx] of duplicateMap) {
      const sourceRow = rows[sourceIdx];
      const colCount = sourceRow.cells.length;

      for (let k = 0; k < dupTimes - 1; k++) {
        const tr = document.createElement("tr");
        const timeStr = randomTime();

        let tds = `<td class="slot-cell"><span class="time-node">${timeStr}</span></td>`;
        // SN列使用重复的SN，并标记为重复
        tds += `<td class="sn-cell duplicate-sn">${sn}</td>`;

        // 复制数据列（从索引2开始）
        for (let c = 2; c < colCount; c++) {
          const sourceTd = sourceRow.cells[c];
          const val = sourceTd.textContent;
          const cls = sourceTd.className;
          tds += `<td class="${cls}">${val}</td>`;
        }
        tr.innerHTML = tds;
        newRows.push(tr);
      }
    }

    // 将新行添加到表格末尾
    newRows.forEach(tr => tbody.appendChild(tr));

    // 显示提示信息
    const totalNew = newRows.length;
    const dupInfo = selectedSNs.map(sn => `${sn} (重复${dupTimes}次)`).join(', ');
    alert(`✅ 已生成 ${totalNew} 行重复条码\n重复的SN: ${dupInfo}`);
  }

  // ---------- 目标CPK ----------
  function generateTargetCPK() {
    const ratio = parseInt(document.getElementById("highRatio").value) || 70;
    const tbody = document.querySelector("#dataTable tbody");
    if (!tbody.rows.length) {
      alert("请先生成数据！");
      return;
    }

    for (let r = 0; r < tbody.rows.length; r++) {
      const tr = tbody.rows[r];
      // A列: 更新时间
      if (tr.cells.length >= 1) {
        const timeCell = tr.cells[0];
        timeCell.innerHTML = `<span class="time-node">${randomTime()}</span>`;
        timeCell.className = "slot-cell";
      }
      // B列: 保留原有SN（不重新生成，避免破坏重复条码标记）
      // 但如果是duplicate-sn标记，保留

      // 数据列
      for (let c = 2; c < tr.cells.length; c++) {
        const td = tr.cells[c];
        if (td.classList.contains("invalid")) continue;

        const high = Math.random() * 100 < ratio;
        const base = getBaseByColIndex(c - 2);
        const val = randomValueWithOutlier(base, 20, high);
        const isOut = isOutlierValue(val, base, 20);
        td.textContent = val;
        td.className = isOut ? 'outlier' : (high ? 'high' : 'low');
      }
    }
  }

  // ---------- 添加超标行 ----------
  function addOutlierRows() {
    const tbody = document.querySelector("#dataTable tbody");
    if (!tbody.rows.length) {
      alert("请先点击「随机生成」创建表格。");
      return;
    }
    const rows = parseInt(document.getElementById("outRow")?.value) || 4;
    const headRow = document.querySelector("#dataTable thead tr");
    const existingCols = headRow ? headRow.cells.length - 2 : 5;

    // 获取现有的SN列表，避免重复
    const existingSNs = [];
    for (let i = 0; i < tbody.rows.length; i++) {
      const snCell = tbody.rows[i].cells[1];
      if (snCell) existingSNs.push(snCell.textContent.trim());
    }
    const snSet = new Set(existingSNs);

    for (let i = 0; i < rows; i++) {
      const tr = document.createElement("tr");
      const timeStr = randomTime();
      // 生成不重复的SN
      let sn = generateSN15();
      let attempts = 0;
      while (snSet.has(sn) && attempts < 100) {
        sn = generateSN15();
        attempts++;
      }
      snSet.add(sn);

      let tds = `<td class="slot-cell"><span class="time-node">${timeStr}</span></td>`;
      tds += `<td class="sn-cell">${sn}</td>`;

      for (let j = 0; j < existingCols; j++) {
        const base = getBaseByColIndex(j);
        const sign = Math.random() > 0.5 ? 1 : -1;
        const offset = 25 + Math.random() * 40;
        let val = base + sign * offset;
        val = Math.round(val);
        tds += `<td class="outlier">${val}</td>`;
      }
      tr.innerHTML = tds;
      tbody.appendChild(tr);
    }
  }

  // ---------- 导出Excel ----------
  function exportExcel() {
    const table = document.getElementById("dataTable");
    const wb = XLSX.utils.table_to_book(table, { sheet: "CPK数据_重复条码" });
    XLSX.writeFile(wb, "CPK数据_重复条码.xlsx");
  }

  // ---------- 点击切换 ----------
  document.querySelector("#dataTable").addEventListener("click", function (e) {
    const td = e.target.closest("td");
    if (!td) return;
    const cellIndex = td.cellIndex;
    if (cellIndex < 2) return;

    if (td.classList.contains("invalid")) {
      td.classList.remove("invalid");
      const colIdx = cellIndex - 2;
      const base = getBaseByColIndex(colIdx);
      const val = randomValueWithOutlier(base, 20, true);
      const isOut = isOutlierValue(val, base, 20);
      td.textContent = val;
      td.className = isOut ? 'outlier' : 'high';
      return;
    }

    td.classList.remove("high", "low", "outlier");
    td.classList.add("invalid");
    if (td.textContent.trim() === "") {
      td.textContent = "";
    }
  });

  // ---------- 补全输入框 ----------
  (function ensureInputs() {
    const container = document.querySelector('.toolbar');
    if (!document.getElementById('outRow')) {
      const inp = document.createElement('input');
      inp.type = 'number';
      inp.id = 'outRow';
      inp.value = '4';
      inp.style.width = '60px';
      inp.placeholder = '行';
      container.appendChild(inp);
    }
    if (!document.getElementById('highRatio')) {
      const inp = document.createElement('input');
      inp.type = 'number';
      inp.id = 'highRatio';
      inp.value = '70';
      inp.style.width = '60px';
      container.appendChild(inp);
    }
    let hasRatioLabel = false;
    container.querySelectorAll('label').forEach(lb => {
      if (lb.textContent.includes('高CPK')) hasRatioLabel = true;
    });
    if (!hasRatioLabel) {
      const lbl = document.createElement('label');
      lbl.innerHTML = '高CPK% <input type="number" id="highRatio" value="70" style="width:60px;">';
      container.appendChild(lbl);
    }
  })();

  // 初始化
  outlierProbability = parseInt(rangeInput.value, 10);
  probDisplay.textContent = outlierProbability + '%';
  generateHeaderAndData();
</script>
</body>
</html>
